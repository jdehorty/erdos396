name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - run: python3 -m py_compile certificates/scripts/check_validate_report.py certificates/scripts/check_search_report.py certificates/scripts/verify_witness.py
      - name: Smoke (erdos396 report)
        run: |
          cargo run --bin erdos396 -- --start 1 --end 1000 -k 1 --workers 1 -o checkpoints_ci_smoke --checkpoint-interval 500
          python3 certificates/scripts/check_search_report.py checkpoints_ci_smoke/search_report_k1_1_1000.json
      - name: Smoke (validate report)
        run: |
          cargo run --bin validate -- -k 1 --start 0 --end 1000 --workers 1 -o validate_ci_smoke --checkpoint-interval 500 --report-interval 1
          python3 certificates/scripts/check_validate_report.py validate_ci_smoke/validate_report_k1_0_1000.json

  lean:
    name: Lean (lake build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      # Restore Lake workspace (packages + local build) when toolchain/manifest unchanged.
      - name: Cache Lake workspace (formal/.lake)
        uses: actions/cache@v4
        with:
          path: formal/.lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('formal/lean-toolchain', 'formal/lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('formal/lean-toolchain', 'formal/lake-manifest.json') }}-
      # Download precompiled Mathlib/.olean artifacts from the community cache (do not compile Mathlib).
      - name: Fetch Mathlib cache
        working-directory: formal
        run: lake exe cache get
      - name: Build Lean formalization
        working-directory: formal
        run: lake build
